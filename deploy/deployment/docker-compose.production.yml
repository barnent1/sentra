version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sentra-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_backup:/backup
    networks:
      - sentra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # FastAPI Backend with Agent System
  api:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.api
    container_name: sentra-api-prod
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENTRA_PUBLIC_URL=${SENTRA_PUBLIC_URL}
      - SENTRA_API_TOKEN=${SENTRA_API_TOKEN}
      - PUSHOVER_APP_TOKEN=${PUSHOVER_APP_TOKEN}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=production
    volumes:
      - api_logs:/app/logs
      - temp_audio:/tmp/sentra-audio
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # Vue.js Dashboard
  dashboard:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.dashboard
    container_name: sentra-dashboard-prod
    restart: unless-stopped
    environment:
      - VITE_API_URL=${SENTRA_PUBLIC_URL}/api
      - VITE_ENVIRONMENT=production
    networks:
      - sentra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  # PWA Mobile Interface  
  mobile:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.mobile
    container_name: sentra-mobile-prod
    restart: unless-stopped
    environment:
      - VITE_API_URL=${SENTRA_PUBLIC_URL}/api
      - VITE_ENVIRONMENT=production
    networks:
      - sentra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: sentra-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/sites:/etc/nginx/sites-enabled:ro
      - nginx_logs:/var/log/nginx
      - letsencrypt_certs:/etc/letsencrypt:ro
      - letsencrypt_www:/var/www/certbot:ro
    networks:
      - sentra-network
    depends_on:
      - api
      - dashboard
      - mobile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # Let's Encrypt SSL Certificates
  certbot:
    image: certbot/certbot:latest
    container_name: sentra-certbot-prod
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - letsencrypt_www:/var/www/certbot
    command: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"
    networks:
      - sentra-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: sentra-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sentra-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: sentra-prometheus-prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sentra-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.2'

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: sentra-grafana-prod
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - sentra-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

networks:
  sentra-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/var/sentra}/postgres
  postgres_backup:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  api_logs:
    driver: local
  temp_audio:
    driver: local
  letsencrypt_certs:
    driver: local
  letsencrypt_www:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local