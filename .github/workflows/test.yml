name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'
  CI: true
  NODE_ENV: test

jobs:
  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        package: [core, api, dashboard]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests - ${{ matrix.package }}
        run: |
          cd packages/${{ matrix.package }}
          npm run test -- --coverage --maxWorkers=2 --ci
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: junit-${{ matrix.package }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.package }}
          path: |
            packages/${{ matrix.package }}/coverage/
            test-results/junit-${{ matrix.package }}.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: packages/${{ matrix.package }}/coverage
          flags: unit,${{ matrix.package }}
          name: unit-${{ matrix.package }}

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sentra_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      qdrant:
        image: qdrant/qdrant:v1.7.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for services to be ready
        run: |
          timeout 60s bash -c 'until curl -f http://localhost:6333/health; do sleep 2; done'
          timeout 60s bash -c 'until pg_isready -h localhost -p 5432 -U test; do sleep 2; done'

      - name: Run database migrations
        run: |
          cd packages/core
          npm run db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sentra_test

      - name: Run integration tests
        run: |
          cd packages/core
          npm run test -- --testPathPattern=integration --coverage --maxWorkers=1 --ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sentra_test
          QDRANT_URL: http://localhost:6333
          OPENAI_API_KEY: sk-test-key-for-integration-tests
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: junit-integration.xml

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            packages/core/coverage/
            test-results/junit-integration.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: packages/core/coverage
          flags: integration
          name: integration-tests

  # ============================================================================
  # Performance Tests
  # ============================================================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance benchmarks
        run: |
          cd packages/core
          npm run test -- --testPathPattern=performance --maxWorkers=1 --ci
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: junit-performance.xml

      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: test-results/junit-performance.xml

  # ============================================================================
  # Load Tests
  # ============================================================================
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sentra_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Start API server
        run: |
          cd packages/api
          npm start &
          sleep 10
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sentra_test
          PORT: 3001

      - name: Run load tests
        run: |
          cd packages/api
          npm run test -- --testPathPattern=load --maxWorkers=1 --ci --forceExit
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: junit-load.xml

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: test-results/junit-load.xml

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sentra_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          cd packages/dashboard
          npx playwright install --with-deps chromium firefox webkit

      - name: Build packages
        run: npm run build

      - name: Run E2E tests
        run: |
          cd packages/dashboard
          npm run e2e -- --reporter=html,junit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sentra_test
          VITE_API_BASE_URL: http://localhost:3001/api
          VITE_WS_URL: http://localhost:3001
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: ../../test-results/junit-e2e.xml

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            packages/dashboard/test-results/
            test-results/junit-e2e.xml

  # ============================================================================
  # Coverage Consolidation
  # ============================================================================
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Merge coverage reports
        run: |
          npx nyc merge artifacts/*/coverage coverage/merged-coverage.json
          npx nyc report --reporter=lcov --reporter=text-summary --temp-dir=coverage --report-dir=coverage/merged
        continue-on-error: true

      - name: Generate coverage summary
        run: |
          echo "# Test Coverage Report" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "## Overall Coverage" >> coverage-summary.md
          echo '```' >> coverage-summary.md
          npx nyc report --reporter=text-summary --temp-dir=coverage >> coverage-summary.md || echo "Coverage merge failed" >> coverage-summary.md
          echo '```' >> coverage-summary.md

      - name: Upload merged coverage
        uses: codecov/codecov-action@v3
        with:
          directory: coverage/merged
          flags: merged
          name: merged-coverage

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            try {
              const coverage = fs.readFileSync('coverage-summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: coverage
              });
            } catch (error) {
              console.log('Could not read coverage summary:', error);
            }

  # ============================================================================
  # Quality Gate
  # ============================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Check test results
        run: |
          # Check if all required tests passed
          echo "Checking quality gate criteria..."
          
          # Count test result files
          UNIT_RESULTS=$(find artifacts/ -name "junit-*.xml" -path "*/unit-test-results-*" | wc -l)
          INTEGRATION_RESULTS=$(find artifacts/ -name "junit-integration.xml" | wc -l)
          PERFORMANCE_RESULTS=$(find artifacts/ -name "junit-performance.xml" | wc -l)
          
          echo "Unit test results found: $UNIT_RESULTS"
          echo "Integration test results found: $INTEGRATION_RESULTS"  
          echo "Performance test results found: $PERFORMANCE_RESULTS"
          
          # Basic quality gate checks
          if [ "$UNIT_RESULTS" -lt 3 ]; then
            echo "❌ Missing unit test results for all packages"
            exit 1
          fi
          
          if [ "$INTEGRATION_RESULTS" -lt 1 ]; then
            echo "❌ Missing integration test results"
            exit 1
          fi
          
          if [ "$PERFORMANCE_RESULTS" -lt 1 ]; then
            echo "❌ Missing performance test results"
            exit 1
          fi
          
          echo "✅ All required tests have results"

      - name: Quality gate status
        run: |
          echo "## Quality Gate Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit Tests: Complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ Integration Tests: Complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ Performance Tests: Complete" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.integration-tests.result }}" == "success" ] && \
             [ "${{ needs.performance-tests.result }}" == "success" ]; then
            echo "🎉 **Quality Gate: PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Quality Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi