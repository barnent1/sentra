networks:
  sentra-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  vault-data:

services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: sentra-postgres
    environment:
      POSTGRES_DB: sentra
      POSTGRES_USER: sentra_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentra_dev_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/database/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - sentra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentra_user -d sentra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentra-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sentra_dev_redis}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - sentra-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Security Services
  vault:
    image: hashicorp/vault:latest
    container_name: sentra-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-sentra-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - vault-data:/vault/data
    ports:
      - "8200:8200"
    networks:
      - sentra-network
    cap_add:
      - IPC_LOCK

  # Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sentra-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: sentra
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-sentra_dev_rabbit}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - sentra-network
    volumes:
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf

  # Core Services
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: sentra-api-gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-sentra-dev-jwt-secret}
      DATABASE_URL: postgresql://sentra_user:${POSTGRES_PASSWORD:-sentra_dev_pass}@postgres:5432/sentra
      REDIS_URL: redis://:${REDIS_PASSWORD:-sentra_dev_redis}@redis:6379
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-sentra-dev-token}
    ports:
      - "3000:3000"
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules

  agent-orchestrator:
    build:
      context: ./services/agent-orchestrator
      dockerfile: Dockerfile
    container_name: sentra-agent-orchestrator
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://sentra_user:${POSTGRES_PASSWORD:-sentra_dev_pass}@postgres:5432/sentra
      REDIS_URL: redis://:${REDIS_PASSWORD:-sentra_dev_redis}@redis:6379
      RABBITMQ_URL: amqp://sentra:${RABBITMQ_PASSWORD:-sentra_dev_rabbit}@rabbitmq:5672
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-sentra-dev-token}
    ports:
      - "3001:3001"
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ./services/agent-orchestrator:/app
      - /app/node_modules

  context-engine:
    build:
      context: ./services/context-engine
      dockerfile: Dockerfile
    container_name: sentra-context-engine
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://sentra_user:${POSTGRES_PASSWORD:-sentra_dev_pass}@postgres:5432/sentra
      REDIS_URL: redis://:${REDIS_PASSWORD:-sentra_dev_redis}@redis:6379
      RABBITMQ_URL: amqp://sentra:${RABBITMQ_PASSWORD:-sentra_dev_rabbit}@rabbitmq:5672
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-sentra-dev-token}
    ports:
      - "3002:3002"
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/context-engine:/app
      - /app/node_modules

  quality-guardian:
    build:
      context: ./services/quality-guardian
      dockerfile: Dockerfile
    container_name: sentra-quality-guardian
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://sentra_user:${POSTGRES_PASSWORD:-sentra_dev_pass}@postgres:5432/sentra
      REDIS_URL: redis://:${REDIS_PASSWORD:-sentra_dev_redis}@redis:6379
      RABBITMQ_URL: amqp://sentra:${RABBITMQ_PASSWORD:-sentra_dev_rabbit}@rabbitmq:5672
    ports:
      - "3003:3003"
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/quality-guardian:/app
      - /app/node_modules

  timeline-intelligence:
    build:
      context: ./services/timeline-intelligence
      dockerfile: Dockerfile
    container_name: sentra-timeline-intelligence
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      DATABASE_URL: postgresql://sentra_user:${POSTGRES_PASSWORD:-sentra_dev_pass}@postgres:5432/sentra
      REDIS_URL: redis://:${REDIS_PASSWORD:-sentra_dev_redis}@redis:6379
      RABBITMQ_URL: amqp://sentra:${RABBITMQ_PASSWORD:-sentra_dev_rabbit}@rabbitmq:5672
    ports:
      - "3004:3004"
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/timeline-intelligence:/app
      - /app/node_modules

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: sentra-auth-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: postgresql://sentra_user:${POSTGRES_PASSWORD:-sentra_dev_pass}@postgres:5432/sentra
      REDIS_URL: redis://:${REDIS_PASSWORD:-sentra_dev_redis}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-sentra-dev-jwt-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-sentra-dev-token}
    ports:
      - "3005:3005"
    networks:
      - sentra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    container_name: sentra-prometheus
    ports:
      - "9090:9090"
    networks:
      - sentra-network
    volumes:
      - prometheus-data:/prometheus
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: sentra-grafana
    ports:
      - "3100:3000"
    networks:
      - sentra-network
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sentra_admin}

  # Development Tools
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sentra-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sentra.dev
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-sentra_admin}
    ports:
      - "5050:80"
    networks:
      - sentra-network
    profiles:
      - dev