version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sentra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./services/api/db/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./services/api
      dockerfile: Dockerfile
    container_name: sentra-api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PUSHOVER_APP_TOKEN=${PUSHOVER_APP_TOKEN}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENTRA_PUBLIC_URL=${SENTRA_PUBLIC_URL}
      - SENTRA_API_TOKEN=${SENTRA_API_TOKEN}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./services/api:/app
      - temp_audio:/tmp/sentra-audio
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: sentra-orchestrator
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SENTRA_API_URL=http://api:8000
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./services/orchestrator:/app
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: sentra-dashboard
    
  caddy:
    image: caddy:2-alpine
    container_name: sentra-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - dashboard
    environment:
      - DOMAIN=${DOMAIN:-localhost}

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  temp_audio: